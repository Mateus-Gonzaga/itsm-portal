# Stack de PRODUÇÃO do portal. Web em :8088 (não conflita com Zabbix/Grafana).
# Banco PostgreSQL próprio (isolado). Use com: bash deploy.sh
services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    env_file: .env
    volumes:
      - .:/var/www/html
    depends_on:
      - db

  web:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "8088:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-itsm}
      POSTGRES_USER: ${DB_USERNAME:-itsm}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - itsm-db:/var/lib/postgresql/data

volumes:
  itsm-db:
